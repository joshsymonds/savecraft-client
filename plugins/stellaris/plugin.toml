game_id = "stellaris"
sources = ["wasm"]
name = "Stellaris"
icon = "icon.png"
description = "Parses Stellaris save files (.sav) — empire overview, economy, technology, military, diplomacy, and more"
channel = "beta"
coverage = "partial"
file_extensions = [".sav"]
homepage = "https://savecraft.gg/plugins/stellaris"
workshop_url = "https://steamcommunity.com/sharedfiles/filedetails/?id=3702302465"

limitations = [
  "Binary (ironman) saves not yet tested — text saves only",
  "Planet section shows summary stats, not full district/building breakdown",
  "Name resolution for wars and fleets uses raw IDs, not localized names",
]

[attribution]
sources = ["paradox"]

[author]
name = "Josh Symonds"
github = "joshsymonds"

[default_paths]
windows = "%DOCUMENTS%/Paradox Interactive/Stellaris/save games/*"
linux = "~/.local/share/Paradox Interactive/Stellaris/save games/*"
darwin = "~/Documents/Paradox Interactive/Stellaris/save games/*"
