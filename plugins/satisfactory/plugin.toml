game_id = "satisfactory"
sources = ["wasm"]
icon = "icon.png"
name = "Satisfactory"
description = "Parses .sav save files: factory machines, production, power, storage, trains, progression"
channel = "alpha"
coverage = "partial"
file_extensions = [".sav"]
homepage = "https://savecraft.gg/plugins/satisfactory"

limitations = [
  "Saves from game versions 1.0 through 1.2 only (save versions 46-60); newer game versions are rejected until their format is verified",
  "Per-minute production rates are theoretical pending recipe reference data; the save stores measured productivity percentages, not item rates",
  "Resource node types and purities require static map reference data",
  "Modded buildings and machines added after game 1.2 are not extracted",
  "Blueprint designer contents are not parsed",
]

# The SaveGames glob matches per-user Epic/Steam ID folders; these siblings
# are not user save directories.
exclude_dirs = ["SaveGames_backup", "ServerLocalCache"]

[attribution]
sources = ["coffeestain"]

[author]
name = "Josh Symonds"
github = "joshsymonds"

[reference.modules.recipe_lookup]
name = "Recipe & Item Lookup"
description = "Look up any Satisfactory item, recipe, or production building by name. Returns exact ingredients, products, per-minute rates at 100% clock, craft duration, which buildings run it, alternate-recipe flags, and milestone unlock tiers. Use proactively for ANY question about what makes what, ratios, or building stats — prevents hallucinated recipe data."
requires_save = false

[reference.modules.production_planner]
name = "Production Planner"
description = "Plan a full Satisfactory production chain: target item and rate per minute returns machine counts per recipe, raw ore/fluid requirements, byproducts, and total power draw. Pass save_id to plan with the player's actual unlocked alternate recipes, existing machine capacity, and the session's Game Mode economy multipliers (1.2 parts cost / power consumption) applied automatically. Use for any 'how do I make N per minute of X' or factory scaling question."
requires_save = false

[reference.modules.production_planner.section_mappings]
progression = "progression"
production_summary = "production_summary"
game_overview = "game_overview"

[reference.modules.milestone_navigator]
name = "Milestone Navigator"
description = "Navigate Satisfactory tiers and milestones: exact costs and recipe unlocks per milestone, full tier listings, and — with save_id — every remaining milestone to a target tier with cumulative item costs based on what the player already purchased. Use for 'what do I need for Tier N' and unlock-path questions."
requires_save = false

[reference.modules.milestone_navigator.section_mappings]
progression = "progression"

[reference.modules.power_calculator]
name = "Power Calculator"
description = "Size Satisfactory generator farms: target megawatts returns generator counts per type, fuel consumption per minute for every accepted fuel, supplemental water rates, and nuclear waste output. Use for any power planning or 'how many generators / how much fuel' question."
requires_save = false

[default_paths]
windows = "%LOCALAPPDATA%/FactoryGame/Saved/SaveGames/*"
linux = "~/.local/share/Steam/steamapps/compatdata/526870/pfx/drive_c/users/steamuser/AppData/Local/FactoryGame/Saved/SaveGames/*"
