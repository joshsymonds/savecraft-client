game_id = "factorio"
sources = ["wasm", "mod"]
icon = "icon.png"
name = "Factorio"
description = "Lua mod exports game state to JSON; daemon watches script-output and pushes structured save data"
channel = "alpha"
homepage = "https://savecraft.gg/plugins/factorio"
coverage = "partial"
file_extensions = [".json"]

limitations = [
  "Requires the Savecraft Export mod installed in Factorio",
  "Modded recipes and items not yet reflected in reference modules — vanilla data only",
  "Space Age content (planets, platforms, quality) tracked in sections but reference modules are base-game only",
]

[attribution]
sources = ["wube"]

[author]
name = "Josh Symonds"
github = "joshsymonds"

[default_paths]
windows = "%APPDATA%/Factorio/script-output/savecraft"
linux = "~/.factorio/script-output/savecraft"
darwin = "~/Library/Application Support/factorio/script-output/savecraft"
