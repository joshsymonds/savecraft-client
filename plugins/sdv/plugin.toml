game_id = "sdv"
sources = ["wasm"]
icon = "icon.png"
name = "Stardew Valley"
description = "Parses Stardew Valley 1.6 save files into structured game state"
channel = "beta"
coverage = "partial"
file_extensions = []
homepage = "https://savecraft.gg/plugins/sdv"

